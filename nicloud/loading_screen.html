<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen for Хмаринка Ніклюда</title>
    <!-- import fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- import styles -->
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <div id="content">
        <img id="screenbg" src="" alt="background">
        <div class="stats">
            <span id="curmap">Поточна мапа: 🤔</span>
        </div>
        <div class="rules">
            <b>Рандомне правило</b><br>
            <span id="random_rule">якесь рандомне правило</span>
        </div>
        <div class="bottom">
            <div class="title">Ви входите на Хмаринку Ніклюда...</div>
        </div>
    </div>
    <script>
        const screenshots = [
            "/res/loadscreen/20241111193650_1.jpg",
            "/res/loadscreen/20241111191320_1.jpg",
            "/res/loadscreen/20241111191332_1.jpg",
            "/res/loadscreen/20241111191320_1.jpg",
            "/res/loadscreen/20241111205850_1.jpg"
        ];

        const rules = [
            "Не треба заважати іншим гравцям. Розумійте, що він такий же гравець що і ви.",
            "Не краште сервер, будь ласка.",
            "Софт, само собою зрозуміло, заборонений.",
            "Будьте чемні в спілкуванні з іншими гравцями. Без расизму, нацизму, рашизму, переслідувань та мови ворожнечі.",
            "Не спамте в чат!!",
            "Слово Ніклюда завжди правильне.",
        ];

        setInterval(setBackground, 15000);
        function setBackground() {
            document.getElementById("screenbg").src = screenshots[Math.floor(Math.random() * screenshots.length)];
        }

        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.type = 'text/css';
        link.href = '/styles/nicloud/loading_screen.css';
        document.head.appendChild(link);

        setInterval(writeRandomRule, 10000);
        function writeRandomRule() {
            document.getElementById("random_rule").innerHTML = rules[Math.floor(Math.random() * rules.length)];
        }

        const bgmusic = new Audio("/res/loadscreen/linga_guli_guli.ogg");
        bgmusic.loop = true;
        bgmusic.volume = 0.1;
        
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
            document.getElementById("curmap").innerHTML = "Поточна мапа: " + mapname;
            bgmusic.volume = volume * 0.25;
        }
        
        setBackground();
        writeRandomRule();

        bgmusic.play();
    </script>
</body>
</html>
