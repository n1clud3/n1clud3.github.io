            var selected_screenshot = screenshots[Math.floor(Math.random() * screenshots.length)];

        }

        setInterval(writeRandomRule, 15000);
        function writeRandomRule() {
            var selected_rule = rules[Math.floor(Math.random() * rules.length)];
            document.getElementById("random_rule").innerHTML = selected_rule;
        }
        
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {

        setBackground();
