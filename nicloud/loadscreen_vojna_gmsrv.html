<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen for Хмаринка Ніклюда</title>
    <!-- import fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <!-- import styles -->
    <link rel="stylesheet" href="/styles/global.css">
</head>
<body>
    <img id="screenbg" src="" alt="background">
        <div class="sidebar">
            <div class="item fl-row">
                <span class="title" id="title_greeting">server name</span>
                <span id="subtitle_greeting">Український сандбокс сервер з тактичною тематикою</span>
            </div>
            <div class="item">
                <span class="title" id="title_curmap">Поточна мапа</span>
                <span id="curmap">🤔</span>
            </div>
            <!--<div class="item">
                <span class="title" id="title_random_rule">Рандомне правило</span>
                <span id="random_rule">якесь рандомне правило</span>
            </div>-->
            <div class="item">
                <span class="title" id="title_hint">Корисна порада</span>
                <span id="hint">якась рандомна порада</span>
            </div>
        </div>
    <script>
        let lang = "en";

        const titles = {
            uk: {
                greeting: "vojna_gmsrv",
                greeting_subt: "сервер в розробці",
                curmap: "Поточна мапа",
                random_rule: "Випадкове правило",
                hint: "Корисна порада"
            },
            en: {
                greeting: "vojna_gmsrv",
                greeting_subt: "server in development",
                curmap: "Current map",
                random_rule: "Random rule",
                hint: "Useful hint"
            }
        }

        const screenshots = [
            "https://images.steamusercontent.com/ugc/9867538612779902926/5047AAD5C7E6C725AB54ED0766F347A59DAF0431/",
            "https://images.steamusercontent.com/ugc/17126072027282520024/D2CF2698C95F153CF98D76FF39528EE4585ACD89/"
        ];

        let screenshotsRuntime = structuredClone(screenshots);

        const rules = {
            uk: [
                "Слово Ніклюда <strong>завжди</strong> правильне.",
                "Користуйтесь здоровим глуздом.",
                "Не краште сервер, будь ласка.",
                "Софт, само собою зрозуміло, заборонений.",
                "Будьте чемні в спілкуванні з іншими гравцями.",
                "Не спамте в чат!!",
                "Речі з JMod дозволено використовувати лише в PvP режимі.",
            ],
            en: [
                "n1clude is <strong>always</strong> right.",
                "Use common sense.",
                "Don't crash the server pls.",
                "Cheats = ban.",
                "Be kind and friendly with other players.",
                "No spamming in chat!!",
                "JMod things are allowed to use only in PvP mode.",
            ]
        }

        const hints = {
            uk: [
                "Підказки? Бро, сервер ще навіть не готовий. Я тіпа єбу які підказки тобі дати.",
                "Чєм дальше в лєс, тєм шкібіді доп доп йєс йєс."
            ],
            en: [
                "Hints? Bro, the server is not even ready yet. Like I fucking know what hints to give.",
                "There should be a joke, but it's not translatable from Ukrainian, so yeah, suck ass."
            ]
        };

        // Load CSS when JS loads
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.type = 'text/css';
        link.href = '/styles/nicloud/loading_screen_vojna.css';
        document.head.appendChild(link);

        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
            document.getElementById("title_greeting").innerHTML = servername;
            document.getElementById("curmap").innerHTML = mapname;
            bgmusic.volume = volume * 0.1;
            lang = language;
            setTitlesLanguage();
        }

        function setTitlesLanguage() {
            document.getElementById("subtitle_greeting").innerHTML = titles[lang].greeting_subt;
            document.getElementById("title_curmap").innerHTML = titles[lang].curmap;
            // document.getElementById("title_random_rule").innerHTML = titles[lang].random_rule;
            document.getElementById("title_hint").innerHTML = titles[lang].hint;
        }

        setInterval(setBackground, 30000);
        function setBackground() {
            const selectionId = Math.floor(Math.random() * screenshotsRuntime.length);
            document.getElementById("screenbg").src = screenshotsRuntime[selectionId];
            screenshotsRuntime.splice(selectionId, 1);

            if (screenshotsRuntime.length <= 0) {
                screenshotsRuntime = structuredClone(screenshots);
            }
        }

        // setInterval(writeRandomRule, 5000);
        // function writeRandomRule() {
        //     document.getElementById("random_rule").innerHTML = rules[lang][Math.floor(Math.random() * rules[lang].length)];
        // }

        setInterval(writeRandomHint, 5000);
        function writeRandomHint() {
            document.getElementById("hint").innerHTML = hints[lang][Math.floor(Math.random() * hints[lang].length)];
        }

        const bgmusic = new Audio("/res/loadscreen/HereInst.mp3");
        bgmusic.loop = true;
        bgmusic.volume = 0.1;
        
        setTitlesLanguage();
        setBackground();
        // writeRandomRule();
        writeRandomHint();

        // bgmusic.play();
    </script>
</body>
</html>
